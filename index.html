  const db = getFirestore(app);

  window._FB = {

    load: async (col,id) => { const s=await getDoc(doc(db,'orvalho',col,'docs',id)); if(!s.exists())return null; const r=s.data(); return r._d?JSON.parse(r._d):r; },
    loadAll: async col => { const s=await getDocs(collection(db,'orvalho',col,'docs')); return s.docs.map(d=>{const r=d.data();return r._d?JSON.parse(r._d):r;}); },
    del: async (col,id) => await deleteDoc(doc(db,'orvalho',col,'docs',id)),

<script type="text/babel">
const{useState,useEffect,useCallback,useMemo,useRef}=React;

const LS={
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
};
const fmtBRL=v=>(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const fmtDate=d=>d?new Date(d+'T12:00:00').toLocaleDateString('pt-BR'):'—';
const today=()=>new Date().toISOString().slice(0,10);
const daysDiff=(a,b)=>{if(!a||!b)return 0;return Math.round((new Date(b+'T12:00:00')-new Date(a+'T12:00:00'))/86400000);};
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const MESES=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const ESTADOS=['AC','AL','AP','AM','BA','CE','DF','ES','GO','MA','MT','MS','MG','PA','PB','PR','PE','PI','RJ','RN','RS','RO','RR','SC','SP','SE','TO'];
const ETAPAS_PAD=['Visita Técnica em Campo','Análise de Dados','Elaboração de Mapas','Elaboração do Laudo / Relatório','Protocolo do Processo','Acompanhamento do Processo','Aguardando Análise do Cliente','Revisão e Ajustes – Cliente','Revisão e Ajustes – Órgão Ambiental','Emissão de ART / RRT','Coleta de Assinaturas','Entrega Final ao Cliente','Outra'];
const CF_DEF=[{id:1,nome:'Canva',valor:35.90,tipo:'mensal'},{id:2,nome:'CRBio',valor:850,tipo:'anual'},{id:3,nome:'Luz',valor:30,tipo:'mensal'},{id:4,nome:'Hospedagem do site e manutenção',valor:50,tipo:'mensal'},{id:5,nome:'Contabilidade',valor:248,tipo:'mensal'},{id:6,nome:'Internet',valor:30,tipo:'mensal'},{id:7,nome:'Taxa de licenciamento (alvará)',valor:27,tipo:'mensal'}];
const CV_TIPOS=['Tráfego pago – Redes Sociais','Google Ads – Site','Material de escritório','Folder','Impressões','Cartões de visita','Equipamentos','Outro'];
const SERVICOS_LEADS=['Autorização Manejo e Resgate de Fauna IBAMA','Educação Ambiental','Estudo de Impacto de Vizinhança','Estudo de Viabilidade Ambiental','Homologação de Fornecedores','Levantamento de Fauna','Levantamento de Flora','Levantamento Florístico / Inventário Florestal','Licença/Autorização Motosserra IBAMA','Palestra Ambiental - Corporativo','Palestra Ambiental - Escolas','Treinamento Ambiental','Treinamento Legislação Ambiental e Afugentamento e Resgate de Fauna','Outro'];
const ORIGENS_LEAD=['Indicação','Redes sociais','Panfletagem','E-mail marketing','Site/Google','Prospecção ativa','Outro'];
const REDES_SOCIAIS=['Facebook','Instagram'];
const TIPO_OCO=['Reunião','Solicitação do cliente','Problema em campo','Comunicação com órgão ambiental','Mudança de escopo','Prorrogação de prazo','Outro'];
const RESULTADO_REM=['Sem resposta','Interessado','Não tem interesse','Reunião agendada','Pediu retorno'];
const TIPO_REM=['E-mail enviado','Ligação','WhatsApp','Visita'];
const MATERIAL_PALF=['Panfleto A4','Folder','Cartão de visita','Kit completo','Outro'];

// ── STATUS ──────────────────────────────────────────────────────
const ST_PROJ={aguardando:{l:'Aguardando início',dot:'dot-blue'},andamento:{l:'Em andamento',dot:'dot-yellow'},atrasado:{l:'Atrasado',dot:'dot-red'},concluido:{l:'Concluído',dot:'dot-green'},cancelado:{l:'Cancelado',dot:'dot-black'}};
const ST_PROP={elaborando:{l:'Elaborando',cls:'b-yellow'},enviada:{l:'Enviada',cls:'b-blue'},aprovada:{l:'Aprovada',cls:'b-green'},reprovada:{l:'Reprovada',cls:'b-red'},'sem-resposta':{l:'Sem Resposta',cls:'b-gray'},cancelada:{l:'Cancelada',cls:'b-gray'}};

// ── FIREBASE SYNC ────────────────────────────────────────────────
function useFB(key,init){
  const[v,sv]=useState(()=>LS.get('orv2_'+key,init));
  const[loaded,setLoaded]=useState(false);
  const set=useCallback(val=>{sv(prev=>{const n=typeof val==='function'?val(prev):val;LS.set('orv2_'+key,n);if(window._FB){window._FB.save(key,key,n).catch(()=>{});}return n;});},[ key]);
  const load=useCallback(async()=>{if(!window._FB)return;try{const d=await window._FB.load(key,key);if(d){sv(d);LS.set('orv2_'+key,d);}}catch{}setLoaded(true);},[key]);
  return[v,set,load,loaded];
}

// ── APP ──────────────────────────────────────────────────────────
function App(){
  const[authed,setAuthed]=useState(false);
  const[fbUser,setFbUser]=useState(null);
  const[loading,setLoading]=useState(true);
  const[page,setPage]=useState('dashboard');
  const[sync,setSync]=useState('');
  const[toast,setToast]=useState('');
  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(''),2500);};

  // Dados compartilhados com App1 (lidos do Firebase)
  const[propostas,setPropostas]=useState([]);
  const[leads,setLeads]=useState(()=>LS.get('orv2_leads2',[]));

  // Dados exclusivos App2
  const[projetos,setProjetos]=useState(()=>LS.get('orv2_projetos',[]));
  const[custosFix,setCustosFix]=useState(()=>LS.get('orv2_custos_fixos',CF_DEF));
  const[custosVar,setCustosVar]=useState(()=>LS.get('orv2_custos_var',[]));
  const[metas,setMetas]=useState(()=>LS.get('orv2_metas',{posts:0,reels:0,panfletos:0,contatos:0,disparos:0,emails:0,leads:0,propEnv:0,propAp:0,fat:0}));
  const[realizacoes,setRealizacoes]=useState(()=>LS.get('orv2_realizacoes',{posts:0,reels:0,panfletos:0,contatos:0,disparos:0,emails:0,leads:0,propEnv:0,propAp:0,fat:0}));
  const[panfletagem,setPanfletagem]=useState(()=>LS.get('orv2_panfletagem',[]));
  const[historico_rem,setHistorico_rem]=useState(()=>LS.get('orv2_histrem',[]));
  const[notasPlano,setNotasPlano]=useState(()=>LS.get('orv2_notas',''));
  const[empresa,setEmpresa]=useState(()=>LS.get('orv2_empresa',{nome:'Orvalho Consultoria Ambiental',cnpj:'49.834.540/0001-60',responsavel:'Bianca da Cruz Iéck',crbio:'CRBio 132683/01-D',endereco:'Joinville/SC',tel:'+55 47 99245-4106',site:'https://orvalhoambiental.com.br',instagram:'https://www.instagram.com/orvalhoconsultoriaambiental/'}));

  // ── FUNÇÃO DE CARGA ROBUSTA DO FIREBASE ──────────────────────────
  // Firebase é SEMPRE a fonte de verdade.
  // LocalStorage é só cache temporário — nunca substitui o Firebase.
  const loadFirebase = async () => {
    setSync('Sincronizando...');
    try {
      // 1. Propostas do App1 (cada proposta é um doc separado)
      const ps = await window._FB.loadAll('proposals');
      if(ps?.length) {
        setPropostas(ps);
        LS.set('orv2_proposals_cache', ps);
      }

      // 2. Leads (salvo como doc único 'leads2')
      const ls = await window._FB.load('leads2','leads2');
      if(ls && Array.isArray(ls)) {
        setLeads(ls);
        LS.set('orv2_leads2', ls);
      }

      // 3. Todos os outros dados do App2
      const campos = [
        ['projetos',     setProjetos,     []],
        ['custos_fixos', setCustosFix,    CF_DEF],
        ['custos_var',   setCustosVar,    []],
        ['metas',        setMetas,        {}],
        ['realizacoes',  setRealizacoes,  {}],
        ['panfletagem',  setPanfletagem,  []],
        ['histrem',      setHistorico_rem,[]],
        ['notas',        setNotasPlano,   ''],
        ['empresa',      setEmpresa,      {}],
      ];
      for(const [chave, setter, def] of campos) {
        const d = await window._FB.load(chave, chave);
        if(d !== null && d !== undefined) {
          setter(d);
          LS.set('orv2_' + chave, d);
        }
      }

      setSync('✓ Sincronizado');
      setTimeout(() => setSync(''), 3000);

    }
  };

  useEffect(()=>{
    const init=()=>{
      if(window._FB){
        window._FB.onAuth(async user=>{
          setFbUser(user);
          setAuthed(!!user);
          setLoading(false);
          if(user) {
            // Sempre carrega do Firebase ao fazer login
            await loadFirebase();
          }
        });
      } else setTimeout(init,300);
    };
    init();
  },[]);

  // ── SALVAR: Firebase PRIMEIRO, localStorage como cache ─────────
  const saveToFB=async(chave,val)=>{
    if(!window._FB){showToast('⚠️ Sem conexão!');return;}
    try{
      await window._FB.save(chave,chave,val);
      LS.set('orv2_'+chave,val);
      showToast('✅ Salvo no Firebase');
    }catch(e){
      showToast('❌ Erro ao salvar!');
      alert('Erro ao salvar no Firebase: '+e.message+'. Tente novamente!');
    }
  };
  const save=(chave,setter)=>val=>{
    setter(val);
    LS.set('orv2_'+chave,val);
    saveToFB(chave,val);
  };
  const saveLeads=val=>{
    setLeads(val);
    LS.set('orv2_leads2',val);
    saveToFB('leads2',val);

// ── LOGIN ────────────────────────────────────────────────────────
function Login(){
  const[email,setEmail]=useState('');const[pass,setPass]=useState('');const[err,setErr]=useState('');const[loading,setLoading]=useState(false);
  const go=async()=>{
    if(!email||!pass){setErr('Preencha e-mail e senha.');return;}
    setLoading(true);setErr('');
    try{if(window._FB)await window._FB.signIn(email,pass);else setErr('Aguarde...');}
    catch(e){const m={'auth/invalid-credential':'E-mail ou senha incorretos.','auth/too-many-requests':'Muitas tentativas. Aguarde.'};setErr(m[e.code]||'Erro: '+e.message);}
    setLoading(false);
  };
  return(

// ── DASHBOARD ────────────────────────────────────────────────────
function Dashboard({propostas,projetos,leads,custosFix,custosVar,setPage}){
  const ap=propostas.filter(p=>p.status==='aprovada');
  const en=propostas.filter(p=>['enviada','aprovada','reprovada'].includes(p.status));
  const fat=ap.reduce((s,p)=>s+(p.budget?.total||0),0);
  const tx=en.length?Math.round(ap.length/en.length*100):0;
  const cfMes=custosFix.reduce((s,c)=>s+(c.tipo==='anual'?c.valor/12:c.valor),0);
  const projAtivos=projetos.filter(p=>p.status==='andamento').length;
  const projConcluidos=projetos.filter(p=>p.status==='concluido').length;
  const projAtrasados=projetos.filter(p=>p.status==='atrasado').length;
  const alertasProp=propostas.filter(p=>p.status==='enviada'&&p.sentAt&&daysDiff(p.sentAt,today())>=7);
  const alertasEtapa=projetos.flatMap(p=>(p.etapas||[]).filter(e=>e.status!=='concluida'&&e.dataPrev&&daysDiff(today(),e.dataPrev)<0).map(e=>({proj:p.nome,etapa:e.nome})));
  const fatMes=MESES.map((_,i)=>ap.filter(p=>new Date(p.date||'').getMonth()===i).reduce((s,p)=>s+(p.budget?.total||0),0));
  const maxFat=Math.max(...fatMes,1);
  const origemCount={};leads.forEach(l=>{const o=l.origemRede?`${l.origem} (${l.origemRede})`:l.origem||'Não informado';origemCount[o]=(origemCount[o]||0)+1;});
  const topOrigens=Object.entries(origemCount).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const svcCount={};leads.forEach(l=>(l.servicos||[]).forEach(s=>{svcCount[s]=(svcCount[s]||0)+1;}));
  const topSvcs=Object.entries(svcCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxSvc=Math.max(...topSvcs.map(([,n])=>n),1);
  const estCount={};leads.forEach(l=>{if(l.estado)estCount[l.estado]=(estCount[l.estado]||0)+1;});
  const topEst=Object.entries(estCount).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const aReceber=projetos.reduce((s,p)=>(p.parcelas||[]).filter(x=>x.status!=='recebida').reduce((s2,x)=>s2+(x.valor||0),s),0);
  const recebido=projetos.reduce((s,p)=>(p.parcelas||[]).filter(x=>x.status==='recebida').reduce((s2,x)=>s2+(x.valor||0),s),0);

  return(
    <div>
      {alertasProp.length>0&&<div className="al al-w">⚠️ {alertasProp.length} proposta(s) enviada(s) há mais de 7 dias sem resposta!</div>}
      {alertasEtapa.length>0&&<div className="al al-w">🔴 {alertasEtapa.length} etapa(s) atrasada(s) em projetos.</div>}

      <div className="kgrid">
        <div className="kcard accent"><div className="kl">Faturamento Aprovado</div><div className="kv">{fmtBRL(fat)}</div><div className="ks">{ap.length} proposta(s)</div></div>
        <div className="kcard accent"><div className="kl">Já Recebido</div><div className="kv">{fmtBRL(recebido)}</div><div className="ks">de projetos</div></div>
        <div className="kcard"><div className="kl">A Receber</div><div className="kv" style={{color:'#d97706'}}>{fmtBRL(aReceber)}</div><div className="ks">parcelas pendentes</div></div>
        <div className="kcard"><div className="kl">Taxa de Fechamento</div><div className="kv">{tx}%</div><div className="ks">{ap.length}/{en.length+ap.length} enviadas</div></div>
        <div className="kcard"><div className="kl">Projetos Ativos</div><div className="kv">{projAtivos}</div><div className="ks">{projConcluidos} concluído(s)</div></div>
        <div className="kcard"><div className="kl">Leads / Contatos</div><div className="kv">{leads.length}</div><div className="ks">{leads.filter(l=>l.tipo==='ativo').length} ativos</div></div>
        <div className="kcard"><div className="kl">Custos Fixos/Mês</div><div className="kv" style={{fontSize:16}}>{fmtBRL(cfMes)}</div><div className="ks">base mensal</div></div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1.4fr 1fr',gap:13,marginBottom:13}}>
        <div className="card" style={{margin:0}}>
          <div className="card-title">Faturamento mensal aprovado</div>
          <div className="chart-bars">
            {fatMes.map((v,i)=>(
              <div key={i} className="chart-bar-w">
                <div className="chart-val">{v>0?Math.round(v/1000)+'k':''}</div>
                <div className="chart-bar" style={{height:`${Math.round(v/maxFat*80)}px`,background:'#285d02'}}/>
                <div className="chart-label">{MESES[i]}</div>
              </div>
            ))}
          </div>
        </div>
        <div className="card" style={{margin:0}}>
          <div className="card-title">Propostas por status</div>
          {Object.entries(ST_PROP).map(([k,v])=>{const n=propostas.filter(p=>p.status===k).length;return n>0?(
            <div key={k} style={{display:'flex',alignItems:'center',gap:8,marginBottom:7}}>
              <span className={`badge ${v.cls}`} style={{minWidth:90,justifyContent:'center'}}>{v.l}</span>
              <div className="pb" style={{flex:1}}><div className="pf" style={{width:`${propostas.length?Math.round(n/propostas.length*100):0}%`,background:'#285d02'}}/></div>
              <span style={{fontSize:12,fontWeight:700,minWidth:20}}>{n}</span>
            </div>
          ):null;})}
          {propostas.length===0&&<div className="empty">Nenhuma proposta ainda</div>}
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:13,marginBottom:13}}>
        <div className="card" style={{margin:0}}>
          <div className="card-title">Serviços mais solicitados (leads)</div>
          {topSvcs.length===0?<div className="empty" style={{padding:16}}>Nenhum lead ainda</div>:topSvcs.map(([s,n])=>(
            <div key={s} style={{marginBottom:9}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:11.5,marginBottom:3}}>
                <span style={{color:'var(--tx)',maxWidth:'80%',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s}</span>
                <span style={{fontWeight:700,color:'#285d02'}}>{n}</span>
              </div>
              <div className="pb"><div className="pf" style={{width:`${Math.round(n/maxSvc*100)}%`,background:'#285d02'}}/></div>
            </div>
          ))}
        </div>
        <div className="card" style={{margin:0}}>
          <div className="card-title">Origem dos leads</div>
          {topOrigens.length===0?<div className="empty" style={{padding:16}}>Nenhum lead ainda</div>:topOrigens.map(([o,n])=>(
            <div key={o} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid var(--bd)',fontSize:12.5}}>
              <span>{o}</span><span className="badge b-vd">{n}</span>
            </div>
          ))}
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:13,marginBottom:13}}>
        <div className="card" style={{margin:0}}>
          <div className="card-title">Leads por estado</div>
          {topEst.length===0?<div className="empty" style={{padding:16}}>Nenhum lead ainda</div>:topEst.map(([e,n])=>(
            <div key={e} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid var(--bd)',fontSize:12.5}}>
              <span style={{fontWeight:600}}>{e}</span><span className="badge b-blue">{n} lead(s)</span>
            </div>
          ))}
        </div>
        <div className="card" style={{margin:0}}>
          <div className="card-title">Projetos por status</div>
          {Object.entries(ST_PROJ).map(([k,v])=>{const n=projetos.filter(p=>p.status===k).length;return(
            <div key={k} style={{display:'flex',alignItems:'center',gap:8,marginBottom:7}}>
              <span className={`dot ${v.dot}`}/>
              <span style={{fontSize:12.5,flex:1}}>{v.l}</span>
              <span style={{fontWeight:700,fontSize:13}}>{n}</span>
            </div>
          );})}
          {projetos.length===0&&<div className="empty" style={{padding:16}}>Nenhum projeto ainda</div>}
        </div>
      </div>

      {(alertasProp.length>0||alertasEtapa.length>0)&&(
        <div className="card">
          <div className="card-title">🔔 Alertas</div>
          {alertasProp.map(p=>(
            <div key={p.id} style={{display:'flex',gap:8,alignItems:'center',padding:'7px 0',borderBottom:'1px solid var(--bd)',fontSize:12.5}}>
              <span className="dot dot-yellow"/>Proposta <strong>{p.number}</strong> — {p.client} — enviada há {daysDiff(p.sentAt,today())} dias sem resposta
            </div>
          ))}
          {alertasEtapa.map((a,i)=>(
            <div key={i} style={{display:'flex',gap:8,alignItems:'center',padding:'7px 0',borderBottom:'1px solid var(--bd)',fontSize:12.5}}>
              <span className="dot dot-red"/>Projeto <strong>{a.proj}</strong> — etapa "{a.etapa}" atrasada
            </div>
          ))}
        </div>
      )}
    </div>
  );
}
// ── PROJETOS ─────────────────────────────────────────────────────
function Projetos({projetos,setProjetos,propostas,leads,setPage}){
  const[show,setShow]=useState(false);
  const[editId,setEditId]=useState(null);
  const[tabP,setTabP]=useState('info');
  const[filtro,setFiltro]=useState({status:'',alerta:false});
  const blank={id:uid(),nome:'',cliente:'',servico:'',proposta:'',valor:0,dataAssinatura:today(),prazoFinal:'',art:'',processo:'',obs:'',status:'aguardando',etapas:[],ocorrencias:[],parcelas:[]};
  const[form,setForm]=useState(blank);
  const F=(k,v)=>setForm(f=>({...f,[k]:v}));

  const novo=()=>{setForm({...blank,id:uid()});setTabP('info');setShow(true);setEditId(null);};
  const editar=p=>{setForm(p);setTabP('info');setShow(true);setEditId(p.id);};
  const salvar=()=>{setProjetos(ps=>editId?ps.map(p=>p.id===editId?form:p):[form,...ps]);setShow(false);};
  const del=id=>{if(confirm('Excluir projeto?'))setProjetos(ps=>ps.filter(p=>p.id!==id));};
  const iniciarDeProposta=p=>{
    setForm({...blank,id:uid(),nome:p.proposalName||p.client,cliente:p.client||'',proposta:p.number||'',valor:p.budget?.total||0,dataAssinatura:today()});
    setTabP('info');setShow(true);setEditId(null);
  };

  const addEtapa=()=>setForm(f=>({...f,etapas:[...f.etapas,{id:uid(),nome:'',dataPrev:'',dataReal:'',resp:'',status:'nao',obs:''}]}));
  const updEtapa=(id,k,v)=>setForm(f=>({...f,etapas:f.etapas.map(e=>e.id===id?{...e,[k]:v}:e)}));
  const addOco=()=>setForm(f=>({...f,ocorrencias:[...f.ocorrencias,{id:uid(),data:today(),tipo:'Reunião',desc:'',autor:'Bianca'}]}));
  const updOco=(id,k,v)=>setForm(f=>({...f,ocorrencias:f.ocorrencias.map(o=>o.id===id?{...o,[k]:v}:o)}));
  const addParc=()=>setForm(f=>({...f,parcelas:[...f.parcelas,{id:uid(),desc:'',data:'',valor:0,nf:'',valorNF:0,dataRec:'',status:'pendente'}]}));
  const updParc=(id,k,v)=>setForm(f=>({...f,parcelas:f.parcelas.map(p=>p.id===id?{...p,[k]:v}:p)}));

  // Status de etapa
  const etapaSt=e=>{
    if(e.status==='concluida')return{dot:'dot-black',emoji:'⚫',label:'Concluída'};
    if(!e.dataPrev)return{dot:'dot-gray',emoji:'⚪',label:'Sem prazo'};
    const d=daysDiff(today(),e.dataPrev);
    if(d<0)return{dot:'dot-red',emoji:'🔴',label:'Atrasada'};
    if(d<=3)return{dot:'dot-yellow',emoji:'🟡',label:'Atenção'};
    return{dot:'dot-green',emoji:'🟢',label:'Em dia'};
  };

  const filtrados=projetos.filter(p=>{
    if(filtro.status&&p.status!==filtro.status)return false;
    if(filtro.alerta){
      const temAlerta=(p.etapas||[]).some(e=>e.status!=='concluida'&&e.dataPrev&&daysDiff(today(),e.dataPrev)<0);
      if(!temAlerta)return false;
    }
    return true;
  });

  // Gantt
  const renderGantt=()=>{
    if(!form.etapas.length||!form.prazoFinal)return null;
    const inicio=form.dataAssinatura||today();
    const fim=form.prazoFinal;
    const total=Math.max(daysDiff(inicio,fim),1);
    const todayOff=Math.round(clamp(daysDiff(inicio,today())/total,0,1)*100);
    const clamp=(v,a,b)=>Math.min(b,Math.max(a,v));
    return(
      <div className="gantt-wrap" style={{marginBottom:14}}>
        <div style={{fontSize:11,fontWeight:700,color:'#285d02',marginBottom:6}}>📅 Timeline</div>
        <div style={{position:'relative',minWidth:500}}>
          <div style={{position:'absolute',left:`${todayOff}%`,top:0,bottom:0,borderLeft:'2px dashed #dc2626',zIndex:5}}>
            <span style={{position:'absolute',top:-15,left:2,fontSize:9,color:'#dc2626',whiteSpace:'nowrap'}}>Hoje</span>
          </div>
          {form.etapas.map((e,i)=>{
            const st=etapaSt(e);
            const off=e.dataPrev?Math.round(clamp(daysDiff(inicio,e.dataPrev)/total,0,0.97)*100):0;
            return(
              <div key={e.id} className="gantt-row">
                <div className="gantt-label" title={e.nome||`Etapa ${i+1}`}>{e.nome||`Etapa ${i+1}`}</div>
                <div className="gantt-bar-bg">
                  <div className="gantt-marker" style={{left:`${off}%`,background:st.dot==='dot-green'?'#22c55e':st.dot==='dot-yellow'?'#f59e0b':'#ef4444'}}/>
                </div>
                <span style={{fontSize:10,whiteSpace:'nowrap'}}>{st.emoji}</span>
              </div>
            );
          })}
        </div>
      </div>
    );
  };

  return(
    <div>
      <div className="flex jsb aic" style={{marginBottom:14}}>
        <div className="flex gap2 aic" style={{flexWrap:'wrap'}}>
          <select className="fs btn-sm" value={filtro.status} onChange={e=>setFiltro(f=>({...f,status:e.target.value}))}>
            <option value="">Todos os status</option>
            {Object.entries(ST_PROJ).map(([k,v])=><option key={k} value={k}>{v.l}</option>)}
          </select>
          <label className="flex aic gap2" style={{fontSize:12,cursor:'pointer'}}>
            <input type="checkbox" checked={filtro.alerta} onChange={e=>setFiltro(f=>({...f,alerta:e.target.checked}))}/>Com alertas
          </label>
          {/* Propostas aprovadas sem projeto */}
          {propostas.filter(p=>p.status==='aprovada'&&!projetos.find(pj=>pj.proposta===p.number)).map(p=>(
            <button key={p.id} className="btn bs btn-sm" onClick={()=>iniciarDeProposta(p)}>🚀 Iniciar: {p.number}</button>
          ))}
        </div>
        <button className="btn bp" onClick={novo}>+ Novo Projeto</button>
      </div>

      <div className="card">
        <div className="tw">
          <table>
            <thead><tr><th>Projeto</th><th>Cliente</th><th>Status</th><th>Prazo Final</th><th>Progresso</th><th>Alertas</th><th></th></tr></thead>
            <tbody>
              {filtrados.length===0&&<tr><td colSpan={7}><div className="empty"><div className="eico">🗂️</div><div>Nenhum projeto encontrado</div></div></td></tr>}
              {filtrados.map(p=>{
                const et=p.etapas||[];
                const conc=et.filter(e=>e.status==='concluida').length;
                const pct=et.length?Math.round(conc/et.length*100):0;
                const st=ST_PROJ[p.status]||ST_PROJ.aguardando;
                const nAtr=et.filter(e=>e.status!=='concluida'&&e.dataPrev&&daysDiff(today(),e.dataPrev)<0).length;
                const nAtc=et.filter(e=>e.status!=='concluida'&&e.dataPrev&&daysDiff(today(),e.dataPrev)>=0&&daysDiff(today(),e.dataPrev)<=3).length;
                const vencFin=p.prazoFinal&&daysDiff(today(),p.prazoFinal)>=0&&daysDiff(today(),p.prazoFinal)<=7;
                return(
                  <tr key={p.id}>
                    <td style={{fontWeight:700}}>{p.nome}</td>
                    <td>{p.cliente}</td>
                    <td><span className="flex aic gap2"><span className={`dot ${st.dot}`}/><span style={{fontSize:11.5}}>{st.l}</span></span></td>
                    <td style={{color:p.prazoFinal&&daysDiff(today(),p.prazoFinal)<0?'#dc2626':'inherit',whiteSpace:'nowrap'}}>{fmtDate(p.prazoFinal)}</td>
                    <td style={{minWidth:120}}>
                      <div className="flex aic gap2"><div className="pb" style={{flex:1}}><div className="pf" style={{width:`${pct}%`,background:'#285d02'}}/></div><span style={{fontSize:10.5,color:'var(--txl)',minWidth:28}}>{pct}%</span></div>
                    </td>
                    <td>
                      {nAtr>0&&<span className="chip b-red" style={{marginRight:3}}>{nAtr} atraso</span>}
                      {nAtc>0&&<span className="chip b-yellow" style={{marginRight:3}}>{nAtc} atenção</span>}
                      {vencFin&&<span className="chip b-orange">Prazo!</span>}
                    </td>
                    <td><div className="flex gap2">
                      <button className="ta" onClick={()=>editar(p)}>✏️</button>
                      <button className="ta" style={{color:'#dc2626'}} onClick={()=>del(p.id)}>🗑</button>
                    </div></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {show&&(
        <div className="mov" onClick={e=>e.target===e.currentTarget&&setShow(false)}>
          <div className="mod mod-lg">
            <div className="mh"><h3>{editId?'Editar Projeto':'Novo Projeto'}</h3><button className="mc" onClick={()=>setShow(false)}>✕</button></div>
            <div className="mb">
              <div className="tabs">
                {[['info','📋 Info'],['etapas','📌 Etapas'],['financeiro','💰 Financeiro'],['ocorrencias','📝 Ocorrências']].map(([k,l])=>(
                  <button key={k} className={`tab${tabP===k?' act':''}`} onClick={()=>setTabP(k)}>{l}</button>
                ))}
              </div>

              {tabP==='info'&&(
                <div>
                  <div className="fr2">
                    <div className="fg"><label className="fl">Nome do Projeto *</label><input className="fc" value={form.nome} onChange={e=>F('nome',e.target.value)}/></div>
                    <div className="fg"><label className="fl">Cliente *</label><input className="fc" value={form.cliente} onChange={e=>F('cliente',e.target.value)}/></div>
                  </div>
                  <div className="fr2">
                    <div className="fg"><label className="fl">Proposta de origem (nº)</label><input className="fc" value={form.proposta} onChange={e=>F('proposta',e.target.value)} placeholder="ORV-..."/></div>
                    <div className="fg"><label className="fl">Valor contratado (R$)</label><input type="number" className="fc" value={form.valor} onChange={e=>F('valor',+e.target.value)}/></div>
                  </div>
                  <div className="fr2">
                    <div className="fg"><label className="fl">Data de assinatura</label><input type="date" className="fc" value={form.dataAssinatura} onChange={e=>F('dataAssinatura',e.target.value)}/></div>
                    <div className="fg"><label className="fl">Prazo final de entrega</label><input type="date" className="fc" value={form.prazoFinal} onChange={e=>F('prazoFinal',e.target.value)}/></div>
                  </div>
                  <div className="fr2">
                    <div className="fg"><label className="fl">Nº ART</label><input className="fc" value={form.art} onChange={e=>F('art',e.target.value)}/></div>
                    <div className="fg"><label className="fl">Nº Processo no Órgão</label><input className="fc" value={form.processo} onChange={e=>F('processo',e.target.value)}/></div>
                  </div>
                  <div className="fg"><label className="fl">Status</label>
                    <select className="fs" value={form.status} onChange={e=>F('status',e.target.value)}>
                      {Object.entries(ST_PROJ).map(([k,v])=><option key={k} value={k}>{v.l}</option>)}
                    </select>
                  </div>
                  <div className="fg"><label className="fl">Observações</label><textarea className="fta" value={form.obs} onChange={e=>F('obs',e.target.value)}/></div>
                </div>
              )}

              {tabP==='etapas'&&(
                <div>
                  {renderGantt()}
                  {form.etapas.map((e,i)=>{
                    const st=etapaSt(e);
                    return(
                      <div key={e.id} style={{background:'var(--bg)',borderRadius:8,padding:11,marginBottom:8}}>
                        <div className="fr2" style={{marginBottom:6}}>
                          <div className="fg" style={{margin:0}}>
                            <label className="fl">Etapa</label>
                            <select className="fs" value={e.nome} onChange={ev=>updEtapa(e.id,'nome',ev.target.value)}>
                              <option value="">Selecione...</option>
                              {ETAPAS_PAD.map(ep=><option key={ep}>{ep}</option>)}
                            </select>
                          </div>
                          <div className="fg" style={{margin:0}}>
                            <label className="fl">Status</label>
                            <select className="fs" value={e.status} onChange={ev=>updEtapa(e.id,'status',ev.target.value)}>
                              <option value="nao">⚪ Não iniciada</option>
                              <option value="andamento">🔵 Em andamento</option>
                              <option value="concluida">🟢 Concluída</option>
                              <option value="atrasada">🔴 Atrasada</option>
                            </select>
                          </div>
                        </div>
                        {e.nome==='Outra'&&<div className="fg" style={{margin:'0 0 6px'}}><input className="fc" placeholder="Especifique..." value={e.nomeCustom||''} onChange={ev=>updEtapa(e.id,'nomeCustom',ev.target.value)}/></div>}
                        <div className="fr3" style={{marginBottom:4}}>
                          <div className="fg" style={{margin:0}}><label className="fl">Data prevista</label><input type="date" className="fc" value={e.dataPrev} onChange={ev=>updEtapa(e.id,'dataPrev',ev.target.value)}/></div>
                          <div className="fg" style={{margin:0}}><label className="fl">Data real</label><input type="date" className="fc" value={e.dataReal} onChange={ev=>updEtapa(e.id,'dataReal',ev.target.value)}/></div>
                          <div className="fg" style={{margin:0}}><label className="fl">Responsável</label><input className="fc" value={e.resp} onChange={ev=>updEtapa(e.id,'resp',ev.target.value)}/></div>
                        </div>
                        <div className="flex jsb aic">
                          <span style={{fontSize:11}}>{st.emoji} {st.label}</span>
                          <button className="btn bd btn-xs" onClick={()=>setForm(f=>({...f,etapas:f.etapas.filter(x=>x.id!==e.id)}))}>Remover</button>
                        </div>
                      </div>
                    );
                  })}
                  <button className="btn bs btn-sm" onClick={addEtapa}>+ Adicionar etapa</button>
                </div>
              )}

              {tabP==='financeiro'&&(
                <div>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:11,fontSize:12.5,fontWeight:600}}>
                    <span>Contratado: {fmtBRL(form.valor)}</span>
                    <span style={{color:'#285d02'}}>Recebido: {fmtBRL((form.parcelas||[]).filter(p=>p.status==='recebida').reduce((s,p)=>s+(p.valor||0),0))}</span>
                  </div>
                  {(form.parcelas||[]).map((p,i)=>(
                    <div key={p.id} style={{background:'var(--bg)',borderRadius:8,padding:11,marginBottom:8}}>
                      <div className="fr3" style={{marginBottom:6}}>
                        <div className="fg" style={{margin:0}}><label className="fl">Parcela</label><input className="fc" value={p.desc} onChange={e=>updParc(p.id,'desc',e.target.value)} placeholder="Ex: 1ª parcela"/></div>
                        <div className="fg" style={{margin:0}}><label className="fl">Vencimento</label><input type="date" className="fc" value={p.data} onChange={e=>updParc(p.id,'data',e.target.value)}/></div>
                        <div className="fg" style={{margin:0}}><label className="fl">Valor (R$)</label><input type="number" className="fc" value={p.valor} onChange={e=>updParc(p.id,'valor',+e.target.value)}/></div>
                      </div>
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:8,alignItems:'end'}}>
                        <div className="fg" style={{margin:0}}><label className="fl">Nº NF</label><input className="fc" value={p.nf} onChange={e=>updParc(p.id,'nf',e.target.value)}/></div>
                        <div className="fg" style={{margin:0}}><label className="fl">Valor NF (R$)</label><input type="number" className="fc" value={p.valorNF} onChange={e=>updParc(p.id,'valorNF',+e.target.value)}/></div>
                        <div className="fg" style={{margin:0}}><label className="fl">Data recebimento</label><input type="date" className="fc" value={p.dataRec} onChange={e=>updParc(p.id,'dataRec',e.target.value)}/></div>
                        <div className="fg" style={{margin:0}}><label className="fl">Status</label>
                          <select className="fs" value={p.status} onChange={e=>updParc(p.id,'status',e.target.value)}>
                            <option value="pendente">🔴 Pendente</option>
                            <option value="vencendo">🟡 Vencendo</option>
                            <option value="recebida">🟢 Recebida</option>
                          </select>
                        </div>
                      </div>
                      <div style={{textAlign:'right'}}><button className="btn bd btn-xs" onClick={()=>setForm(f=>({...f,parcelas:f.parcelas.filter(x=>x.id!==p.id)}))}>Remover</button></div>
                    </div>
                  ))}
                  <button className="btn bs btn-sm" onClick={addParc}>+ Adicionar parcela</button>
                </div>
              )}

              {tabP==='ocorrencias'&&(
                <div>
                  {(form.ocorrencias||[]).map((o,i)=>(
                    <div key={o.id} style={{background:'var(--bg)',borderRadius:8,padding:11,marginBottom:8}}>
                      <div className="fr3" style={{marginBottom:6}}>
                        <div className="fg" style={{margin:0}}><label className="fl">Data</label><input type="date" className="fc" value={o.data} onChange={e=>updOco(o.id,'data',e.target.value)}/></div>
                        <div className="fg" style={{margin:0}}><label className="fl">Tipo</label>
                          <select className="fs" value={o.tipo} onChange={e=>updOco(o.id,'tipo',e.target.value)}>
                            {TIPO_OCO.map(t=><option key={t}>{t}</option>)}
                          </select>
                        </div>
                        <div className="fg" style={{margin:0}}><label className="fl">Autor</label><input className="fc" value={o.autor} onChange={e=>updOco(o.id,'autor',e.target.value)}/></div>
                      </div>
                      <div className="fg" style={{marginBottom:0}}><label className="fl">Descrição</label><textarea className="fta" rows={2} value={o.desc} onChange={e=>updOco(o.id,'desc',e.target.value)}/></div>
                    </div>
                  ))}
                  <button className="btn bs btn-sm" onClick={addOco}>+ Registrar ocorrência</button>
                </div>
              )}
            </div>
            <div className="mf">
              <button className="btn bs" onClick={()=>setShow(false)}>Cancelar</button>
              <button className="btn bp" onClick={salvar}>💾 Salvar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── FINANÇAS ─────────────────────────────────────────────────────
function Financas({propostas,projetos,custosFix,setCustosFix,custosVar,setCustosVar}){
  const[tab,setTab]=useState('dashboard');
  const[periodoMes,setPeriodoMes]=useState(new Date().getMonth());
  const[periodoAno,setPeriodoAno]=useState(new Date().getFullYear());
  const[showCF,setShowCF]=useState(false);const[formCF,setFormCF]=useState({nome:'',valor:0,tipo:'mensal'});
  const[showCV,setShowCV]=useState(false);const[formCV,setFormCV]=useState({tipo:'',qual:'',valor:0,data:today(),obs:''});

  const cfMes=custosFix.reduce((s,c)=>s+(c.tipo==='anual'?c.valor/12:c.valor),0);
  const cfAno=custosFix.reduce((s,c)=>s+(c.tipo==='anual'?c.valor:c.valor*12),0);
  const cvTotal=custosVar.reduce((s,c)=>s+(c.valor||0),0);
  const ap=propostas.filter(p=>p.status==='aprovada');
  const en=propostas.filter(p=>['enviada','aprovada','reprovada'].includes(p.status));
  const fat=ap.reduce((s,p)=>s+(p.budget?.total||0),0);
  const tx=en.length?Math.round(ap.length/en.length*100):0;

  // Por mês selecionado
  const apMes=ap.filter(p=>{const d=new Date(p.date||'');return d.getMonth()===periodoMes&&d.getFullYear()===periodoAno;});
  const fatMes=apMes.reduce((s,p)=>s+(p.budget?.total||0),0);

  // Gráfico taxa de fechamento 12 meses
  const txMeses=MESES.map((_,i)=>{
    const apM=ap.filter(p=>new Date(p.date||'').getMonth()===i).length;
    const enM=en.filter(p=>new Date(p.date||'').getMonth()===i).length;
    return enM?Math.round(apM/enM*100):0;
  });

  return(
    <div>
      <div className="tabs">
        {[['dashboard','📊 Dashboard'],['fixos','📌 Custos Fixos'],['variaveis','📦 Custos Variáveis']].map(([k,l])=>(
          <button key={k} className={`tab${tab===k?' act':''}`} onClick={()=>setTab(k)}>{l}</button>
        ))}
      </div>

      {tab==='dashboard'&&(
        <div>
          <div style={{display:'flex',gap:8,marginBottom:14,alignItems:'center'}}>
            <select className="fs btn-sm" value={periodoMes} onChange={e=>setPeriodoMes(+e.target.value)}>
              {MESES.map((m,i)=><option key={i} value={i}>{m}</option>)}
            </select>
            <select className="fs btn-sm" value={periodoAno} onChange={e=>setPeriodoAno(+e.target.value)}>
              {[2024,2025,2026,2027].map(a=><option key={a} value={a}>{a}</option>)}
            </select>
            <span style={{fontSize:12,color:'var(--txl)'}}>Exibindo: {MESES[periodoMes]}/{periodoAno}</span>
          </div>
          <div className="kgrid">
            <div className="kcard accent"><div className="kl">Faturamento (mês)</div><div className="kv">{fmtBRL(fatMes)}</div></div>
            <div className="kcard accent"><div className="kl">Faturamento Total</div><div className="kv">{fmtBRL(fat)}</div></div>
            <div className="kcard"><div className="kl">Taxa de Fechamento</div><div className="kv">{tx}%</div></div>
            <div className="kcard"><div className="kl">Custos Fixos/Mês</div><div className="kv" style={{fontSize:16}}>{fmtBRL(cfMes)}</div></div>
            <div className="kcard"><div className="kl">Custos Variáveis</div><div className="kv" style={{fontSize:16}}>{fmtBRL(cvTotal)}</div></div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:13}}>
            <div className="card" style={{margin:0}}>
              <div className="card-title">Taxa de fechamento por mês (%)</div>
              <div className="chart-bars">
                {txMeses.map((v,i)=>(
                  <div key={i} className="chart-bar-w">
                    <div className="chart-val">{v>0?v+'%':''}</div>
                    <div className="chart-bar" style={{height:`${v}px`,background:v>=80?'#22c55e':v>=50?'#f59e0b':'#ef4444'}}/>
                    <div className="chart-label">{MESES[i]}</div>
                  </div>
                ))}
              </div>
            </div>
            <div className="card" style={{margin:0}}>
              <div className="card-title">Faturamento vs Custos</div>
              <div style={{padding:'8px 0'}}>
                {[['Faturamento aprovado',fat,'#285d02'],['Custos fixos/ano',cfAno,'#f59e0b'],['Custos variáveis',cvTotal,'#ef4444']].map(([l,v,c])=>(
                  <div key={l} style={{marginBottom:10}}>
                    <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:3}}><span>{l}</span><span style={{fontWeight:700}}>{fmtBRL(v)}</span></div>
                    <div className="pb"><div className="pf" style={{width:`${Math.min(100,Math.round(v/Math.max(fat,1)*100))}%`,background:c}}/></div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}

      {tab==='fixos'&&(
        <div>
          {showCF&&(
            <div className="mov" onClick={e=>e.target===e.currentTarget&&setShowCF(false)}>
              <div className="mod" style={{maxWidth:440}}>
                <div className="mh"><h3>{formCF.id?'Editar':'Novo'} Custo Fixo</h3><button className="mc" onClick={()=>setShowCF(false)}>✕</button></div>
                <div className="mb">
                  <div className="fg"><label className="fl">Nome *</label><input className="fc" value={formCF.nome} onChange={e=>setFormCF(f=>({...f,nome:e.target.value}))}/></div>
                  <div className="fr2">
                    <div className="fg"><label className="fl">Tipo</label><select className="fs" value={formCF.tipo} onChange={e=>setFormCF(f=>({...f,tipo:e.target.value}))}><option value="mensal">Mensal</option><option value="anual">Anual</option></select></div>
                    <div className="fg"><label className="fl">Valor (R$)</label><input type="number" className="fc" value={formCF.valor} onChange={e=>setFormCF(f=>({...f,valor:+e.target.value}))}/></div>
                  </div>
                </div>
                <div className="mf">
                  <button className="btn bs" onClick={()=>setShowCF(false)}>Cancelar</button>
                  <button className="btn bp" onClick={()=>{formCF.id?setCustosFix(cs=>cs.map(c=>c.id===formCF.id?formCF:c)):setCustosFix(cs=>[...cs,{...formCF,id:uid()}]);setShowCF(false);}}>Salvar</button>
                </div>
              </div>
            </div>
          )}
          <div className="flex jsb aic" style={{marginBottom:13}}>
            <div>
              <span style={{fontSize:13,fontWeight:700,color:'#285d02'}}>Total mensal: {fmtBRL(cfMes)}</span>
              <span style={{fontSize:12,color:'var(--txl)',marginLeft:12}}>Anual: {fmtBRL(cfAno)}</span>
            </div>
            <button className="btn bp btn-sm" onClick={()=>{setFormCF({nome:'',valor:0,tipo:'mensal'});setShowCF(true);}}>+ Novo Custo</button>
          </div>
          <div className="card">
            <div className="tw"><table>
              <thead><tr><th>Despesa</th><th>Tipo</th><th>Valor</th><th>Mensal equiv.</th><th></th></tr></thead>
              <tbody>
                {custosFix.map(c=>(
                  <tr key={c.id}>
                    <td style={{fontWeight:500}}>{c.nome}</td>
                    <td><span className={`badge ${c.tipo==='anual'?'b-orange':'b-green'}`}>{c.tipo}</span></td>
                    <td>{fmtBRL(c.valor)}</td>
                    <td>{fmtBRL(c.tipo==='anual'?c.valor/12:c.valor)}</td>
                    <td><div className="flex gap2">
                      <button className="ta" onClick={()=>{setFormCF({...c});setShowCF(true);}}>✏️</button>
                      <button className="ta" style={{color:'#dc2626'}} onClick={()=>setCustosFix(cs=>cs.filter(x=>x.id!==c.id))}>🗑</button>
                    </div></td>
                  </tr>
                ))}
                <tr><td colSpan={3} style={{fontWeight:700,color:'#285d02'}}>TOTAL MENSAL</td><td style={{fontWeight:800,color:'#285d02',fontSize:14}}>{fmtBRL(cfMes)}</td><td/></tr>
              </tbody>
            </table></div>
          </div>
        </div>
      )}

      {tab==='variaveis'&&(
        <div>
          {showCV&&(
            <div className="mov" onClick={e=>e.target===e.currentTarget&&setShowCV(false)}>
              <div className="mod" style={{maxWidth:460}}>
                <div className="mh"><h3>Registrar Custo Variável</h3><button className="mc" onClick={()=>setShowCV(false)}>✕</button></div>
                <div className="mb">
                  <div className="fg"><label className="fl">Tipo *</label>
                    <select className="fs" value={formCV.tipo} onChange={e=>setFormCV(f=>({...f,tipo:e.target.value}))}>
                      <option value="">Selecione</option>{CV_TIPOS.map(t=><option key={t}>{t}</option>)}
                    </select>
                  </div>
                  {(formCV.tipo==='Equipamentos'||formCV.tipo==='Outro')&&<div className="fg"><label className="fl">{formCV.tipo==='Equipamentos'?'Qual equipamento?':'Descrição'}</label><input className="fc" value={formCV.qual} onChange={e=>setFormCV(f=>({...f,qual:e.target.value}))}/></div>}
                  <div className="fr2">
                    <div className="fg"><label className="fl">Valor (R$) *</label><input type="number" className="fc" value={formCV.valor} onChange={e=>setFormCV(f=>({...f,valor:+e.target.value}))}/></div>
                    <div className="fg"><label className="fl">Data *</label><input type="date" className="fc" value={formCV.data} onChange={e=>setFormCV(f=>({...f,data:e.target.value}))}/></div>
                  </div>
                  <div className="fg"><label className="fl">Observações</label><textarea className="fta" rows={2} value={formCV.obs} onChange={e=>setFormCV(f=>({...f,obs:e.target.value}))}/></div>
                </div>
                <div className="mf">
                  <button className="btn bs" onClick={()=>setShowCV(false)}>Cancelar</button>
                  <button className="btn bp" onClick={()=>{setCustosVar(cv=>[{...formCV,id:uid()},...cv]);setShowCV(false);}}>Registrar</button>
                </div>
              </div>
            </div>
          )}
          <div className="flex jsb aic" style={{marginBottom:13}}>
            <span style={{fontSize:13,fontWeight:700,color:'#285d02'}}>Total registrado: {fmtBRL(cvTotal)}</span>
            <button className="btn bp btn-sm" onClick={()=>{setFormCV({tipo:'',qual:'',valor:0,data:today(),obs:''});setShowCV(true);}}>+ Registrar Custo</button>
          </div>
          <div className="card">
            <div className="tw"><table>
              <thead><tr><th>Tipo</th><th>Detalhes</th><th>Valor</th><th>Data</th><th>Obs</th><th></th></tr></thead>
              <tbody>
                {custosVar.length===0&&<tr><td colSpan={6}><div className="empty">Nenhum custo registrado ainda</div></td></tr>}
                {custosVar.map(c=>(
                  <tr key={c.id}>
                    <td>{c.tipo}</td><td style={{color:'var(--txl)'}}>{c.qual}</td>
                    <td style={{fontWeight:700}}>{fmtBRL(c.valor)}</td>
                    <td>{fmtDate(c.data)}</td><td style={{color:'var(--txl)',fontSize:11.5}}>{c.obs}</td>
                    <td><button className="ta" style={{color:'#dc2626'}} onClick={()=>setCustosVar(cv=>cv.filter(x=>x.id!==c.id))}>🗑</button></td>
                  </tr>
                ))}
              </tbody>
            </table></div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── LEADS ─────────────────────────────────────────────────────────
function Leads({leads,setLeads,setPage}){
  const[show,setShow]=useState(false);
  const[editId,setEditId]=useState(null);
  const[filtro,setFiltro]=useState({tipo:'',estado:'',busca:''});
  const[municipios,setMunicipios]=useState([]);
  const blank={id:uid(),nome:'',fantasia:'',cnpjCpf:'',tipoCnpj:'cnpj',ramo:'',responsavel:'',data:today(),tipo:'contato',servicos:[],svcTema:'',svcOutro:'',email1:'',email2:'',tel1:'',tipTel1:'whatsapp',nomeTel1:'',tel2:'',tipTel2:'celular',nomeTel2:'',tel3:'',tipTel3:'fixo',nomeTel3:'',estado:'SC',municipio:'',origem:'',origemDesc:'',origemRede:'',obs:''};
  const[form,setForm]=useState(blank);
  const F=(k,v)=>setForm(f=>({...f,[k]:v}));

  // Busca municípios via IBGE
  useEffect(()=>{
    if(!form.estado)return;
    fetch(`https://servicodados.ibge.gov.br/api/v1/localidades/estados/${form.estado}/municipios`)
      .then(r=>r.json()).then(data=>setMunicipios(data.map(m=>m.nome).sort()))
      .catch(()=>setMunicipios([]));
  },[form.estado]);

  const novo=()=>{setForm({...blank,id:uid()});setShow(true);setEditId(null);};
  const editar=l=>{setForm(l);setShow(true);setEditId(l.id);};
  const salvar=()=>{setLeads(ls=>editId?ls.map(l=>l.id===editId?form:l):[form,...ls]);setShow(false);};
  const del=id=>{if(confirm('Excluir lead?'))setLeads(ls=>ls.filter(l=>l.id!==id));};
  const toggleSvc=s=>F('servicos',form.servicos?.includes(s)?form.servicos.filter(x=>x!==s):[...(form.servicos||[]),s]);

  const filtrados=leads.filter(l=>
    (filtro.tipo===''||l.tipo===filtro.tipo)&&
    (filtro.estado===''||l.estado===filtro.estado)&&
    (filtro.busca===''||(l.fantasia||l.nome||'').toLowerCase().includes(filtro.busca.toLowerCase())||(l.responsavel||'').toLowerCase().includes(filtro.busca.toLowerCase()))
  );

  return(
    <div>
      {show&&(
        <div className="mov" onClick={e=>e.target===e.currentTarget&&setShow(false)}>
          <div className="mod">
            <div className="mh"><h3>{editId?'Editar':'Novo'} Lead</h3><button className="mc" onClick={()=>setShow(false)}>✕</button></div>
            <div className="mb">
              <div className="fr2">
                <div className="fg"><label className="fl">Nome Fantasia *</label><input className="fc" value={form.fantasia||''} onChange={e=>F('fantasia',e.target.value)}/></div>
                <div className="fg"><label className="fl">Razão Social</label><input className="fc" value={form.nome||''} onChange={e=>F('nome',e.target.value)}/></div>
              </div>
              <div className="fr2">
                <div className="fg"><label className="fl">Tipo de documento</label><select className="fs" value={form.tipoCnpj} onChange={e=>F('tipoCnpj',e.target.value)}><option value="cnpj">CNPJ</option><option value="cpf">CPF</option></select></div>
                <div className="fg"><label className="fl">{(form.tipoCnpj||'cnpj').toUpperCase()}</label><input className="fc" value={form.cnpjCpf||''} onChange={e=>F('cnpjCpf',e.target.value)} placeholder={form.tipoCnpj==='cpf'?'000.000.000-00':'00.000.000/0000-00'}/></div>
              </div>
              <div className="fr2">
                <div className="fg"><label className="fl">Ramo da empresa</label><input className="fc" value={form.ramo||''} onChange={e=>F('ramo',e.target.value)} placeholder="Construtora, loteamento..."/></div>
                <div className="fg"><label className="fl">Responsável pelo orçamento *</label><input className="fc" value={form.responsavel||''} onChange={e=>F('responsavel',e.target.value)}/></div>
              </div>
              <div className="fr2">
                <div className="fg"><label className="fl">Tipo</label><select className="fs" value={form.tipo} onChange={e=>F('tipo',e.target.value)}><option value="ativo">🟢 Lead Ativo</option><option value="contato">🔵 Contato</option></select></div>
                <div className="fg"><label className="fl">Data de cadastro</label><input type="date" className="fc" value={form.data} onChange={e=>F('data',e.target.value)}/></div>
              </div>
              <div className="fg"><label className="fl">Serviços contratados / interesse</label>
                <div style={{display:'flex',flexWrap:'wrap',gap:6,padding:'6px 0'}}>
                  {SERVICOS_LEADS.map(s=>(<div key={s} style={{marginBottom:2}}><label style={{display:'flex',alignItems:'center',gap:5,fontSize:12,cursor:'pointer'}}><input type="checkbox" checked={(form.servicos||[]).includes(s)} onChange={()=>toggleSvc(s)}/>{s}</label>{s==='Treinamento Ambiental'&&(form.servicos||[]).includes(s)&&<input className="fc" style={{marginTop:3,fontSize:11.5}} value={form.svcTema||''} onChange={e=>F('svcTema',e.target.value)} placeholder="Qual tema do treinamento?"/>}{s==='Outro'&&(form.servicos||[]).includes(s)&&<input className="fc" style={{marginTop:3,fontSize:11.5}} value={form.svcOutro||''} onChange={e=>F('svcOutro',e.target.value)} placeholder="Qual serviço?"/>}</div>))}
                </div>
              </div>
              <div className="fr2">
                <div className="fg"><label className="fl">E-mail 1 (principal)</label><input type="email" className="fc" value={form.email1||''} onChange={e=>F('email1',e.target.value)}/></div>
                <div className="fg"><label className="fl">E-mail 2</label><input type="email" className="fc" value={form.email2||''} onChange={e=>F('email2',e.target.value)}/></div>
              </div>
              {/* Telefones */}
              {[['1',form.tipTel1,'tipTel1',form.tel1,'tel1',form.nomeTel1,'nomeTel1'],['2',form.tipTel2,'tipTel2',form.tel2,'tel2',form.nomeTel2,'nomeTel2'],['3',form.tipTel3,'tipTel3',form.tel3,'tel3',form.nomeTel3,'nomeTel3']].map(([n,tip,tipK,tel,telK,nome,nomeK])=>(
                <div key={n} style={{display:'grid',gridTemplateColumns:'110px 1fr 1fr',gap:8,marginBottom:8,alignItems:'end'}}>
                  <div className="fg" style={{margin:0}}><label className="fl">{n==='1'?'Telefone 1':n==='2'?'Telefone 2':'Telefone 3'}</label>
                    <select className="fs" value={tip||'whatsapp'} onChange={e=>F(tipK,e.target.value)}>
                      <option value="whatsapp">WhatsApp</option><option value="celular">Celular</option><option value="fixo">Fixo</option>
                    </select>
                  </div>
                  <div className="fg" style={{margin:0}}><label className="fl">Número</label><input className="fc" value={tel||''} onChange={e=>F(telK,e.target.value)} placeholder="(00) 00000-0000"/></div>
                  <div className="fg" style={{margin:0}}><label className="fl">Nome do contato</label><input className="fc" value={nome||''} onChange={e=>F(nomeK,e.target.value)} placeholder="Ex: Gerente, Sócia..."/></div>
                </div>
              ))}
              <div className="fr2">
                <div className="fg"><label className="fl">Estado</label><select className="fs" value={form.estado||'SC'} onChange={e=>{F('estado',e.target.value);F('municipio','');}}>{ESTADOS.map(s=><option key={s}>{s}</option>)}</select></div>
                <div className="fg"><label className="fl">Município</label>
                  <select className="fs" value={form.municipio||''} onChange={e=>F('municipio',e.target.value)}>
                    <option value="">Selecione...</option>
                    {municipios.map(m=><option key={m}>{m}</option>)}
                  </select>
                </div>
              </div>
              <div className="fr2">
                <div className="fg"><label className="fl">Origem do Lead</label>
                  <select className="fs" value={form.origem||''} onChange={e=>F('origem',e.target.value)}><option value="">Selecione</option>{ORIGENS_LEAD.map(o=><option key={o}>{o}</option>)}</select>
                </div>
                {form.origem==='Redes sociais'&&(
                  <div className="fg"><label className="fl">Qual rede social?</label>
                    <select className="fs" value={form.origemRede||''} onChange={e=>F('origemRede',e.target.value)}>
                      <option value="">Selecione</option>{REDES_SOCIAIS.map(r=><option key={r}>{r}</option>)}
                    </select>
                  </div>
                )}
                {(form.origem==='Indicação'||form.origem==='Outro')&&<div className="fg"><label className="fl">{form.origem==='Indicação'?'Quem indicou?':'Qual origem?'}</label><input className="fc" value={form.origemDesc||''} onChange={e=>F('origemDesc',e.target.value)}/></div>}
              </div>
              <div className="fg"><label className="fl">Observações</label><textarea className="fta" rows={2} value={form.obs||''} onChange={e=>F('obs',e.target.value)}/></div>
            </div>
            <div className="mf"><button className="btn bs" onClick={()=>setShow(false)}>Cancelar</button><button className="btn bp" onClick={salvar}>💾 Salvar</button></div>
          </div>
        </div>
      )}

      <div className="flex gap2 aic" style={{marginBottom:14,flexWrap:'wrap'}}>
        <input className="fc" style={{maxWidth:220}} placeholder="🔍 Buscar empresa ou responsável..." value={filtro.busca} onChange={e=>setFiltro(f=>({...f,busca:e.target.value}))}/>
        <select className="fs btn-sm" value={filtro.tipo} onChange={e=>setFiltro(f=>({...f,tipo:e.target.value}))}><option value="">Todos</option><option value="ativo">Lead Ativo</option><option value="contato">Contato</option></select>
        <select className="fs btn-sm" value={filtro.estado} onChange={e=>setFiltro(f=>({...f,estado:e.target.value}))}><option value="">Todos estados</option>{ESTADOS.map(s=><option key={s}>{s}</option>)}</select>
        <span style={{fontSize:11.5,color:'var(--txl)'}}>{filtrados.length} lead(s)</span>
        <div style={{marginLeft:'auto'}}><button className="btn bp btn-sm" onClick={novo}>+ Novo Lead</button></div>
      </div>

      <div className="card">
        <div className="tw"><table>
          <thead><tr><th>Empresa</th><th>Responsável</th><th>Local</th><th>Tipo</th><th>Serviços</th><th>Origem</th><th></th></tr></thead>
          <tbody>
            {filtrados.length===0&&<tr><td colSpan={7}><div className="empty"><div className="eico">👥</div>Nenhum lead cadastrado</div></td></tr>}
            {filtrados.map(l=>(
              <tr key={l.id}>
                <td style={{fontWeight:700}}>{l.fantasia||l.nome}</td>
                <td>{l.responsavel}</td>
                <td style={{whiteSpace:'nowrap'}}>{l.municipio}/{l.estado}</td>
                <td><span className={`badge ${l.tipo==='ativo'?'b-green':'b-blue'}`}>{l.tipo==='ativo'?'🟢 Ativo':'🔵 Prospect'}</span></td>
                <td>{(l.servicos||[]).slice(0,2).map(s=><span key={s} className="tag">{s.split(' ')[0]}</span>)}{(l.servicos||[]).length>2&&<span className="tag">+{l.servicos.length-2}</span>}</td>
                <td style={{fontSize:11.5,color:'var(--txl)'}}>{l.origem}{l.origemDesc&&` — ${l.origemDesc}`}</td>
                <td><div className="flex gap2">
                  <button className="ta" onClick={()=>editar(l)}>✏️</button>
                  <button className="ta" style={{color:'#dc2626'}} onClick={()=>del(l.id)}>🗑</button>
                </div></td>
              </tr>
            ))}
          </tbody>
        </table></div>
      </div>
    </div>
  );
}

// ── REMARKETING ───────────────────────────────────────────────────
function Remarketing({leads,propostas,historico_rem,setHistorico_rem}){
  const[filtros,setFiltros]=useState({tipo:'',estado:'',servico:'',semProp90:false});
  const[showReg,setShowReg]=useState(null);
  const[formReg,setFormReg]=useState({data:today(),tipo:'E-mail enviado',obs:'',resultado:'Sem resposta',retorno:'',diasRetorno:''});

  const ids90=useMemo(()=>new Set(propostas.filter(p=>{const d=new Date(p.date||'');return(new Date()-d)/86400000<=90;}).map(p=>p.client).filter(Boolean)),[propostas]);

  const filtrados=leads.filter(l=>(filtros.tipo===''||l.tipo===filtros.tipo)&&(filtros.estado===''||l.estado===filtros.estado)&&(filtros.servico===''||(l.servicos||[]).includes(filtros.servico))&&(!filtros.semProp90||!ids90.has(l.fantasia||l.nome)));

  const exportCSV=()=>{
    const rows=[['Empresa','Responsável','E-mail','Telefone','Estado','Município'],...filtrados.map(l=>[l.fantasia||l.nome,l.responsavel,l.email1,l.tel1,l.estado,l.municipio])];
    const blob=new Blob([rows.map(r=>r.join(',')).join('\n')],{type:'text/csv'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='leads_remarketing.csv';a.click();
  };

  const registrarAcao=l=>{
    setShowReg(l);
    setFormReg({data:today(),tipo:'E-mail enviado',obs:'',resultado:'Sem resposta',retorno:'',diasRetorno:'',leadId:l.id,leadNome:l.fantasia||l.nome});
  };

  return(
    <div>
      <div className="card" style={{marginBottom:14}}>
        <div className="card-title">🎯 Filtros de Segmentação</div>
        <div className="fr3" style={{marginBottom:10}}>
          <div className="fg" style={{margin:0}}><label className="fl">Tipo</label><select className="fs" value={filtros.tipo} onChange={e=>setFiltros(f=>({...f,tipo:e.target.value}))}><option value="">Todos</option><option value="ativo">Lead Ativo</option><option value="contato">Contato</option></select></div>
          <div className="fg" style={{margin:0}}><label className="fl">Estado</label><select className="fs" value={filtros.estado} onChange={e=>setFiltros(f=>({...f,estado:e.target.value}))}><option value="">Todos</option>{ESTADOS.map(s=><option key={s}>{s}</option>)}</select></div>
          <div className="fg" style={{margin:0}}><label className="fl">Serviço</label>
            <select className="fs" value={filtros.servico} onChange={e=>setFiltros(f=>({...f,servico:e.target.value}))}>
              <option value="">Todos</option>{SERVICOS_LEADS.map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
        </div>
        <label style={{display:'flex',alignItems:'center',gap:7,fontSize:12.5,cursor:'pointer',marginBottom:11}}>
          <input type="checkbox" checked={filtros.semProp90} onChange={e=>setFiltros(f=>({...f,semProp90:e.target.checked}))}/>Sem proposta nos últimos 90 dias (reativar inativos)
        </label>
        <div className="flex jsb aic">
          <span style={{fontSize:12,color:'var(--txl)'}}>{filtrados.length} leads selecionados</span>
          <button className="btn bp btn-sm" onClick={exportCSV}>📥 Exportar CSV</button>
        </div>
      </div>

      {showReg&&(
        <div className="mov" onClick={e=>e.target===e.currentTarget&&setShowReg(null)}>
          <div className="mod" style={{maxWidth:460}}>
            <div className="mh"><h3>Ação — {showReg.fantasia||showReg.nome}</h3><button className="mc" onClick={()=>setShowReg(null)}>✕</button></div>
            <div className="mb">
              <div className="fr2">
                <div className="fg"><label className="fl">Data</label><input type="date" className="fc" value={formReg.data} onChange={e=>setFormReg(f=>({...f,data:e.target.value}))}/></div>
                <div className="fg"><label className="fl">Tipo de ação</label><select className="fs" value={formReg.tipo} onChange={e=>setFormReg(f=>({...f,tipo:e.target.value}))}>{TIPO_REM.map(t=><option key={t}>{t}</option>)}</select></div>
              </div>
              <div className="fg"><label className="fl">Resultado</label><select className="fs" value={formReg.resultado} onChange={e=>setFormReg(f=>({...f,resultado:e.target.value}))}>{RESULTADO_REM.map(t=><option key={t}>{t}</option>)}</select></div>
              {formReg.resultado==='Pediu retorno'&&<div className="fr2">
                <div className="fg"><label className="fl">Data de retorno</label><input type="date" className="fc" value={formReg.retorno} onChange={e=>setFormReg(f=>({...f,retorno:e.target.value}))}/></div>
                <div className="fg"><label className="fl">Ou em X dias</label><input type="number" className="fc" value={formReg.diasRetorno} onChange={e=>setFormReg(f=>({...f,diasRetorno:e.target.value}))}/></div>
              </div>}
              <div className="fg"><label className="fl">Observações</label><textarea className="fta" rows={2} value={formReg.obs} onChange={e=>setFormReg(f=>({...f,obs:e.target.value}))}/></div>
            </div>
            <div className="mf">
              <button className="btn bs" onClick={()=>setShowReg(null)}>Cancelar</button>
              <button className="btn bp" onClick={()=>{setHistorico_rem(h=>[{...formReg,id:uid()},...h]);setShowReg(null);}}>Registrar</button>
            </div>
          </div>
        </div>
      )}

      <div className="card" style={{marginBottom:14}}>
        <div className="tw"><table>
          <thead><tr><th>Empresa</th><th>E-mail</th><th>Telefone</th><th>Local</th><th>Ações</th><th></th></tr></thead>
          <tbody>
            {filtrados.length===0&&<tr><td colSpan={6}><div className="empty">Nenhum lead com estes filtros</div></td></tr>}
            {filtrados.map(l=>{
              const hist=historico_rem.filter(h=>h.leadId===l.id);
              return(
                <tr key={l.id}>
                  <td style={{fontWeight:600}}>{l.fantasia||l.nome}</td>
                  <td>{l.email1}</td><td>{l.tel1}</td>
                  <td style={{whiteSpace:'nowrap'}}>{l.municipio}/{l.estado}</td>
                  <td>{hist.length>0&&<span className="badge b-blue">{hist.length} ação(ões)</span>}</td>
                  <td><button className="btn bs btn-xs" onClick={()=>registrarAcao(l)}>+ Ação</button></td>
                </tr>
              );
            })}
          </tbody>
        </table></div>
      </div>

      {historico_rem.length>0&&(
        <div className="card">
          <div className="card-title">📋 Histórico de Ações</div>
          <div className="tw"><table>
            <thead><tr><th>Data</th><th>Lead</th><th>Tipo</th><th>Resultado</th><th>Retorno</th><th>Obs</th><th></th></tr></thead>
            <tbody>
              {historico_rem.slice(0,40).map(h=>(
                <tr key={h.id}><td>{fmtDate(h.data)}</td><td>{h.leadNome}</td><td>{h.tipo}</td><td>{h.resultado}</td>
                  <td>{h.retorno?fmtDate(h.retorno):h.diasRetorno?`${h.diasRetorno} dias`:'—'}</td>
                  <td style={{fontSize:11.5,color:'var(--txl)'}}>{h.obs}</td>
                  <td><button className="ta" style={{color:'#dc2626'}} onClick={()=>setHistorico_rem(h2=>h2.filter(x=>x.id!==h.id))}>🗑</button></td>
                </tr>
              ))}
            </tbody>
          </table></div>
        </div>
      )}
    </div>
  );
}

// ── METAS ─────────────────────────────────────────────────────────
function Metas({metas,setMetas,realizacoes,setRealizacoes,notasPlano,setNotasPlano}){
  const pct=(r,m)=>m>0?Math.min(100,Math.round(r/m*100)):0;
  const cor=p=>p>=80?'#22c55e':p>=50?'#f59e0b':'#ef4444';
  const cats=[
    {titulo:'📱 Redes Sociais',items:[{k:'posts',l:'Posts por mês'},{k:'reels',l:'Reels por mês'}]},
    {titulo:'📤 Panfletagem',items:[{k:'panfletos',l:'Panfletos distribuídos'},{k:'contatos',l:'Contatos presenciais'}]},
    {titulo:'📧 E-mail Marketing',items:[{k:'disparos',l:'Disparos por mês'},{k:'emails',l:'Novos e-mails enviados'}]},
    {titulo:'🎯 Prospecção',items:[{k:'leads',l:'Novos leads cadastrados'},{k:'propEnv',l:'Propostas enviadas'},{k:'propAp',l:'Propostas aprovadas'},{k:'fat',l:'Faturamento (R$)'}]},
  ];
  return(
    <div>
      {cats.map(cat=>(
        <div key={cat.titulo} className="card" style={{marginBottom:12}}>
          <div className="card-title">{cat.titulo}</div>
          {cat.items.map(({k,l})=>{
            const p=pct(realizacoes[k],metas[k]);
            const isBRL=k==='fat';
            return(
              <div key={k} style={{marginBottom:14}}>
                <div className="flex jsb aic" style={{marginBottom:4}}>
                  <span style={{fontSize:13,fontWeight:500}}>{l}</span>
                  <div className="flex aic gap2">
                    <span style={{fontSize:11,color:'var(--txl)'}}>Realizado:</span>
                    <input type="number" min="0" value={realizacoes[k]||0} onChange={e=>setRealizacoes(r=>({...r,[k]:+e.target.value}))} style={{width:75,padding:'3px 6px',border:'1px solid var(--bd)',borderRadius:6,fontSize:12,textAlign:'center',fontFamily:'inherit'}}/>
                    <span style={{fontSize:11,color:'var(--txl)'}}>Meta:</span>
                    <input type="number" min="0" value={metas[k]||0} onChange={e=>setMetas(m=>({...m,[k]:+e.target.value}))} style={{width:75,padding:'3px 6px',border:'1px solid var(--bd)',borderRadius:6,fontSize:12,textAlign:'center',fontFamily:'inherit'}}/>
                    <span style={{fontSize:12,fontWeight:800,color:cor(p),minWidth:34,textAlign:'right'}}>{p}%</span>
                  </div>
                </div>
                <div className="pb"><div className="pf" style={{width:`${p}%`,background:cor(p)}}/></div>
              </div>
            );
          })}
        </div>
      ))}
      <div className="card">
        <div className="card-title">📝 Notas e Plano de Ação</div>
        <textarea className="fta" rows={5} value={notasPlano} onChange={e=>setNotasPlano(e.target.value)} placeholder="Estratégias, ações e observações do mês..."/>
      </div>
    </div>
  );
}

// ── PANFLETAGEM ───────────────────────────────────────────────────
function Panfletagem({panfletagem,setPanfletagem,setLeads,leads}){
  const[show,setShow]=useState(false);
  const[municipios,setMunicipios]=useState([]);
  const blank={id:uid(),data:today(),estado:'SC',municipio:'',local:'',material:'Panfleto A4',outroMat:'',qtde:0,contato:'nao',nomeContato:'',cargo:'',emailC:'',telC:'',obs:''};
  const[form,setForm]=useState(blank);
  const F=(k,v)=>setForm(f=>({...f,[k]:v}));

  useEffect(()=>{
    if(!form.estado)return;
    fetch(`https://servicodados.ibge.gov.br/api/v1/localidades/estados/${form.estado}/municipios`)
      .then(r=>r.json()).then(data=>setMunicipios(data.map(m=>m.nome).sort()))
      .catch(()=>setMunicipios([]));
  },[form.estado]);

  const salvar=()=>{setPanfletagem(ps=>[{...form,id:uid()},...ps]);setShow(false);};
  const salvarLead=r=>{setLeads(ls=>[{id:uid(),fantasia:r.nomeContato,nome:r.nomeContato,responsavel:r.nomeContato,email1:r.emailC,tel1:r.telC,tipTel1:'celular',estado:r.estado,municipio:r.municipio,tipo:'contato',data:r.data,origem:'Panfletagem',servicos:[],obs:r.obs},...ls]);alert('✅ Lead salvo!');};
  const del=id=>{if(confirm('Excluir registro?'))setPanfletagem(ps=>ps.filter(p=>p.id!==id));};

  const cobertura=useMemo(()=>{
    const m={};panfletagem.forEach(r=>{const k=`${r.estado} — ${r.municipio}`;m[k]=(m[k]||0)+1;});
    return Object.entries(m).sort((a,b)=>b[1]-a[1]);
  },[panfletagem]);

  const totalMat=panfletagem.reduce((s,r)=>s+(+r.qtde||0),0);

  return(
    <div>
      {show&&(
        <div className="mov" onClick={e=>e.target===e.currentTarget&&setShow(false)}>
          <div className="mod">
            <div className="mh"><h3>Registrar Distribuição</h3><button className="mc" onClick={()=>setShow(false)}>✕</button></div>
            <div className="mb">
              <div className="fr3">
                <div className="fg"><label className="fl">Data *</label><input type="date" className="fc" value={form.data} onChange={e=>F('data',e.target.value)}/></div>
                <div className="fg"><label className="fl">Estado</label><select className="fs" value={form.estado} onChange={e=>{F('estado',e.target.value);F('municipio','');}}>{ESTADOS.map(s=><option key={s}>{s}</option>)}</select></div>
                <div className="fg"><label className="fl">Município</label><select className="fs" value={form.municipio} onChange={e=>F('municipio',e.target.value)}><option value="">Selecione</option>{municipios.map(m=><option key={m}>{m}</option>)}</select></div>
              </div>
              <div className="fr2">
                <div className="fg"><label className="fl">Local / Ponto</label><input className="fc" value={form.local} onChange={e=>F('local',e.target.value)} placeholder="Construtora, evento, rua..."/></div>
                <div className="fg"><label className="fl">Material</label><select className="fs" value={form.material} onChange={e=>F('material',e.target.value)}>{MATERIAL_PALF.map(m=><option key={m}>{m}</option>)}</select></div>
              </div>
              {form.material==='Outro'&&<div className="fg"><label className="fl">Qual material?</label><input className="fc" value={form.outroMat} onChange={e=>F('outroMat',e.target.value)}/></div>}
              <div className="fg" style={{maxWidth:160}}><label className="fl">Quantidade</label><input type="number" className="fc" value={form.qtde} onChange={e=>F('qtde',e.target.value)}/></div>
              <div className="fg"><label className="fl">Contato presencial?</label><select className="fs" style={{maxWidth:180}} value={form.contato} onChange={e=>F('contato',e.target.value)}><option value="nao">Não</option><option value="sim">Sim</option></select></div>
              {form.contato==='sim'&&(
                <div>
                  <div className="fr2">
                    <div className="fg"><label className="fl">Nome</label><input className="fc" value={form.nomeContato} onChange={e=>F('nomeContato',e.target.value)}/></div>
                    <div className="fg"><label className="fl">Cargo</label><input className="fc" value={form.cargo} onChange={e=>F('cargo',e.target.value)}/></div>
                  </div>
                  <div className="fr2">
                    <div className="fg"><label className="fl">E-mail</label><input type="email" className="fc" value={form.emailC} onChange={e=>F('emailC',e.target.value)}/></div>
                    <div className="fg"><label className="fl">Telefone</label><input className="fc" value={form.telC} onChange={e=>F('telC',e.target.value)}/></div>
                  </div>
                </div>
              )}
              <div className="fg"><label className="fl">Observações</label><textarea className="fta" rows={2} value={form.obs} onChange={e=>F('obs',e.target.value)}/></div>
            </div>
            <div className="mf"><button className="btn bs" onClick={()=>setShow(false)}>Cancelar</button><button className="btn bp" onClick={salvar}>Salvar</button></div>
          </div>
        </div>
      )}

      <div className="flex jsb aic" style={{marginBottom:14}}>
        <div>
          <span style={{fontSize:13,fontWeight:700,color:'#285d02'}}>{panfletagem.length} registro(s)</span>
          <span style={{fontSize:12,color:'var(--txl)',marginLeft:10}}>{totalMat} materiais distribuídos</span>
        </div>
        <button className="btn bp" onClick={()=>{setForm({...blank,id:uid()});setShow(true);}}>+ Registrar</button>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:13}}>
        <div className="card" style={{margin:0}}>
          <div className="card-title">Histórico</div>
          <div className="tw"><table>
            <thead><tr><th>Data</th><th>Local</th><th>Material</th><th>Qtde</th><th>Contato?</th><th></th></tr></thead>
            <tbody>
              {panfletagem.length===0&&<tr><td colSpan={6}><div className="empty">Nenhum registro ainda</div></td></tr>}
              {panfletagem.map(r=>(
                <tr key={r.id}>
                  <td>{fmtDate(r.data)}</td>
                  <td>{r.local} — {r.municipio}/{r.estado}</td>
                  <td style={{fontSize:11.5}}>{r.material==='Outro'?r.outroMat:r.material}</td>
                  <td style={{fontWeight:700}}>{r.qtde}</td>
                  <td>{r.contato==='sim'?<span className="badge b-green">✓ Sim</span>:<span style={{color:'var(--txl)',fontSize:11.5}}>Não</span>}</td>
                  <td><div className="flex gap2">
                    {r.contato==='sim'&&<button className="btn bp btn-xs" onClick={()=>salvarLead(r)}>👤 Lead</button>}
                    <button className="ta" style={{color:'#dc2626'}} onClick={()=>del(r.id)}>🗑</button>
                  </div></td>
                </tr>
              ))}
            </tbody>
          </table></div>
        </div>
        <div className="card" style={{margin:0}}>
          <div className="card-title">Cobertura por local</div>
          {cobertura.length===0?<p style={{color:'var(--txl)',fontSize:12}}>Nenhuma cobertura ainda.</p>:cobertura.map(([loc,n])=>(
            <div key={loc} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:'1px solid var(--bd)',fontSize:12}}>
              <span style={{color:'var(--tx)'}}>{loc}</span><span className="badge b-vd">{n}x</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── CONFIGURAÇÕES ────────────────────────────────────────────────
function Configuracoes({empresa,setEmpresa}){
  const[saved,setSaved]=useState(false);
  const save=()=>{setSaved(true);setTimeout(()=>setSaved(false),2000);};
  return(
    <div>
      <div className="card">
        <div className="ch"><div className="card-title" style={{marginBottom:0}}>🏢 Dados da Empresa</div>{saved&&<span className="badge b-green">✓ Salvo</span>}</div>
        {[['nome','Nome da Empresa'],['cnpj','CNPJ'],['responsavel','Responsável Técnica'],['crbio','CRBio'],['endereco','Endereço'],['tel','Telefone'],['site','Site'],['instagram','Instagram']].map(([k,l])=>(
          <div key={k} className="fg"><label className="fl">{l}</label><input className="fc" value={empresa[k]||''} onChange={e=>setEmpresa(c=>({...c,[k]:e.target.value}))}/></div>
        ))}
        <button className="btn bp btn-sm" onClick={save}>💾 Salvar dados</button>
      </div>
      <div className="card">
        <div className="card-title">ℹ️ Sobre este app</div>
        <p style={{fontSize:12.5,color:'var(--txl)',lineHeight:1.6}}>
          <strong>Orvalho Gestão</strong> — App 2 do sistema Orvalho Consultoria Ambiental.<br/>
          Dados compartilhados com o App 1 (Propostas) via Firebase Firestore.<br/>
          Hospedagem: GitHub Pages · Banco de dados: Firebase (Plano Spark — gratuito).<br/>
          Desenvolvido com React + JavaScript puro.
        </p>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
